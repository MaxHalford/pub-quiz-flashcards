name: Publish

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install Python dependencies
        run: uv sync

      - name: Compute cache key
        id: cachekey
        run: echo "week=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache Wikipedia titles dumps
        # Cache keyed by ISO week. Most publishes hit; once a week the dumps
        # are refreshed so new article titles eventually become matchable.
        uses: actions/cache@v4
        with:
          path: |
            scrape/_enwiki_titles.gz
            scrape/_frwiki_titles.gz
          key: wiki-titles-${{ steps.cachekey.outputs.week }}
          restore-keys: |
            wiki-titles-

      # Annotation pipeline. See Makefile for what each step produces.
      #   1. entities  — Wikipedia entity spans per card (offline; uses
      #                  the cached titles dump from the step above)
      #   2. topics    — ORES articletopic scores per linked title
      #                  (incremental fetch from LiftWing; the committed
      #                  scrape/wikipedia_topics.json is the cache, so a
      #                  steady-state build hits the network 0 times)
      #   3. card-topics — editorial topic per card (pure derivation)
      - name: Build entity annotations
        run: make wiki-entities

      - name: Fetch article topics
        run: make wiki-topics

      - name: Aggregate card topics
        run: make wiki-card-topics

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
