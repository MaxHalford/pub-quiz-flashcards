name: Scrape

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@v7

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "scrape/$(date -u +'%Y-%m-%d')"

      - name: Scrape loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for i in $(seq 1 10); do
            echo "=== Run $i ==="
            make the_guardian_weekly
            git add -A
            if git diff --cached --quiet; then
              echo "No changes, stopping"
              break
            fi
            git commit -m "scrape: the_guardian_weekly run $i"
          done

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(git log origin/main..HEAD --oneline | wc -l)" -eq 0 ]; then
            echo "No new commits"
            exit 0
          fi
          BRANCH=$(git branch --show-current)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git push -u origin "$BRANCH"
          gh pr create --title "Scrape: $(date -u +'%Y-%m-%d')" --body "Automated scrape run"
